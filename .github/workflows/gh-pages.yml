name: Deploy to GitHub Pages

on:
  schedule:
    - cron: '0 7,11,15 * * *' # Thrice daily
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: dom, libxml, simplexml, yaml

      - name: Install Dependencies
        run: composer install --no-dev --optimize-autoloader

      - name: Create required directories
        run: mkdir -p var/cache var/log public

      - name: Process Feeds
        run: php bin/console app:process-feeds
        env:
          APP_ENV: prod
          APP_SECRET: ${{ secrets.APP_SECRET || 'static_secret_for_gh_pages' }}

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: public
          branch: gh-pages
